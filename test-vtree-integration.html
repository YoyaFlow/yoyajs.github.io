<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VTree 演示</title>
  <script type="module">
    import { vTree, div, h2, flex, button } from '../yoya/index.js';

    const treeData = [
      {
        key: '1',
        title: '节点 1',
        children: [
          { key: '1-1', title: '节点 1-1' },
          { key: '1-2', title: '节点 1-2', children: [
            { key: '1-2-1', title: '节点 1-2-1' },
            { key: '1-2-2', title: '节点 1-2-2' }
          ]}
        ]
      },
      {
        key: '2',
        title: '节点 2',
        children: [
          { key: '2-1', title: '节点 2-1' }
        ]
      },
      {
        key: '3',
        title: '节点 3（禁用）',
        disabled: true
      },
      {
        key: '4',
        title: '节点 4（可选）',
        selectable: true
      }
    ];

    let treeInstance = null;

    window.addEventListener('DOMContentLoaded', () => {
      const app = document.getElementById('app');

      // 操作按钮区域
      const actionArea = flex(f => {
        f.gap('12px');
        f.style('marginBottom', '20px');
        f.button(b => {
          b.text('展开全部');
          b.onclick(() => treeInstance && treeInstance.expandAll());
        });
        f.button(b => {
          b.text('收起全部');
          b.onclick(() => treeInstance && treeInstance.collapseAll());
        });
        f.button(b => {
          b.text('获取选中节点');
          b.onclick(() => {
            if (treeInstance) {
              const keys = treeInstance.selectedKeys();
              console.log('[选中节点 keys]', keys);
              toast.info(`选中节点：${keys.join(', ') || '无'}`);
            }
          });
        });
        f.button(b => {
          b.text('获取勾选节点');
          b.onclick(() => {
            if (treeInstance) {
              const keys = treeInstance.checkedKeys();
              console.log('[勾选节点 keys]', keys);
              toast.info(`勾选节点：${keys.join(', ') || '无'}`);
            }
          });
        });
      });
      app.appendChild(actionArea.renderDom());

      // VTree 容器
      const treeContainer = div();
      const tree = vTree(t => {
        t.data(treeData);
        t.checkable(true);
        t.expandedKeys(['1', '2']);
        t.onSelect((e) => {
          console.log('[VTree onSelect]', e);
          toast.info(`选中：${e.node.title || e.node.key}`);
        });
        t.onCheck((e) => {
          console.log('[VTree onCheck]', e);
          toast.success(`勾选：${e.node.title || e.node.key}`);
        });
        t.onExpand((e) => {
          console.log('[VTree onExpand]', e);
        });
      });
      treeInstance = tree;
      treeContainer.child(tree);

      // 添加到页面
      app.appendChild(treeContainer.renderDom());

      // 输出测试说明
      console.log('=== VTree 演示 ===');
      console.log('1. 点击节点 - 切换选中状态');
      console.log('2. 点击复选框 - 支持级联勾选/取消');
      console.log('3. 点击展开图标 - 展开/收起子节点');
      console.log('4. 使用顶部按钮 - 快速操作树状态');
    });
  </script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    #app {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    .demo-desc {
      color: #666;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>VTree 树形组件演示</h1>
  <p class="demo-desc">支持节点选择、复选框级联勾选、展开/收起等功能</p>
  <div id="app"></div>

  <script>
    // 简单的 toast 实现
    const toast = {
      info: (msg) => showMessage(msg, 'info'),
      success: (msg) => showMessage(msg, 'success'),
      warning: (msg) => showMessage(msg, 'warning'),
      error: (msg) => showMessage(msg, 'error')
    };

    function showMessage(message, type = 'info') {
      const div = document.createElement('div');
      div.textContent = message;
      div.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 20px;
        background: ${type === 'success' ? '#52c41a' : type === 'warning' ? '#faad14' : type === 'error' ? '#ff4d4f' : '#1890ff'};
        color: #fff;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        z-index: 9999;
        transition: all 0.3s;
      `;
      document.body.appendChild(div);
      setTimeout(() => {
        div.style.opacity = '0';
        setTimeout(() => div.remove(), 300);
      }, 2000);
    }
  </script>
</body>
</html>
