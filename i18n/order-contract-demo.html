<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单/合同管理 - i18n 演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--yoya-bg, #fff);
      color: var(--yoya-text, #2B2D30);
      min-height: 100vh;
    }

    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 页面头部 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--yoya-border);
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--yoya-text);
    }

    .language-switcher {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .lang-btn {
      padding: 8px 16px;
      border: 1px solid var(--yoya-border);
      border-radius: 6px;
      background: var(--yoya-bg);
      color: var(--yoya-text);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .lang-btn:hover {
      background: var(--yoya-bg-hover);
      border-color: var(--yoya-primary);
    }

    .lang-btn.active {
      background: var(--yoya-primary);
      color: white;
      border-color: var(--yoya-primary);
    }

    /* 内容网格 */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .content-grid .full-width {
      grid-column: 1 / -1;
    }

    /* 卡片样式 */
    .card {
      background: var(--yoya-card-bg);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--yoya-shadow);
      border: 1px solid var(--yoya-border-light);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--yoya-border-light);
      color: var(--yoya-text);
    }

    /* 状态徽章 */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-pending { background: var(--yoya-warning-bg); color: var(--yoya-warning); }
    .status-processing { background: var(--yoya-info-bg); color: var(--yoya-info); }
    .status-completed { background: var(--yoya-success-bg); color: var(--yoya-success); }
    .status-active { background: var(--yoya-primary-alpha); color: var(--yoya-primary); }
    .status-expired { background: var(--yoya-error-bg); color: var(--yoya-error); }
    .status-paid { background: var(--yoya-success-bg); color: var(--yoya-success); }
    .status-unpaid { background: var(--yoya-warning-bg); color: var(--yoya-warning); }
    .status-shipped { background: var(--yoya-info-bg); color: var(--yoya-info); }

    /* 客户等级徽章 */
    .level-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: var(--yoya-primary-alpha);
      color: var(--yoya-primary);
    }

    /* 操作栏 */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--yoya-border-light);
    }

    /* 信息行 */
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--yoya-border-light);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--yoya-text-secondary);
      font-size: 13px;
    }

    .info-value {
      font-weight: 500;
      font-size: 14px;
    }

    /* 物流信息框 */
    .shipping-box {
      margin-top: 16px;
      padding: 12px;
      background: var(--yoya-bg-secondary);
      border-radius: 6px;
    }

    /* 备注框 */
    .remark-box {
      margin-top: 16px;
      padding: 12px;
      background: var(--yoya-bg-secondary);
      border-radius: 6px;
    }

    .remark-label {
      color: var(--yoya-text-secondary);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .remark-content {
      color: var(--yoya-text);
      font-size: 14px;
    }

    /* 警告提示 */
    .warning-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: var(--yoya-warning-bg);
      color: var(--yoya-warning);
    }

    .expired-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: var(--yoya-error-bg);
      color: var(--yoya-error);
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-container" id="app"></div>

  <script type="module">
    import {
      div, span, vDetail, vField, vInput, vButton, toast,
      initI18n, registerLanguage, setLanguage, getLanguage
    } from '../../../yoya/index.js';

    // 导入语言包
    import zhCN from './i18n/zh-CN.json' assert { type: 'json' };
    import en from './i18n/en.json' assert { type: 'json' };
    import mn from './i18n/mn.json' assert { type: 'json' };

    // 初始化 i18n
    initI18n({
      defaultLanguage: 'zh-CN',
      languages: new Map([
        ['zh-CN', zhCN],
        ['en', en],
        ['mn', mn]
      ])
    });

    // 翻译辅助函数
    function t(key, params = {}) {
      const lang = getLanguage();
      const pack = lang === 'zh-CN' ? zhCN : (lang === 'en' ? en : mn);

      const keys = key.split('.');
      let value = pack;
      for (const k of keys) {
        if (value && typeof value === 'object' && k in value) {
          value = value[k];
        } else {
          return key;
        }
      }

      if (params && typeof params === 'object') {
        return String(value).replace(/\{(\w+)\}/g, (match, pKey) => params[pKey] || match);
      }
      return value;
    }

    // 订单数据
    let orderData = {
      orderNumber: 'ORD-2026030801',
      orderDate: '2026-03-08',
      orderStatus: 'processing',
      orderAmount: '12,580.00',
      currency: 'CNY',
      paymentMethod: 'alipay',
      paymentStatus: 'paid',
      shippingMethod: 'express',
      shippingStatus: 'shipped',
      shippingAddress: '北京市朝阳区 xxx 街道 xxx 号',
      trackingNumber: 'SF1234567890',
      customerName: '张三',
      customerEmail: 'zhangsan@example.com',
      customerPhone: '138****5678',
      customerCompany: '某某科技有限公司',
      customerLevel: 'vip',
      contractNumber: 'CTR-2026-001',
      contractName: '年度采购框架协议',
      contractType: 'purchase',
      contractAmount: '50,000.00',
      signDate: '2026-01-15',
      effectiveDate: '2026-01-20',
      expiryDate: '2027-01-19',
      partyA: '某某科技有限公司',
      partyB: '供应商有限公司',
      agentName: '李四',
      department: '采购部',
      remark: '长期合作客户，享受 VIP 折扣'
    };

    // 状态徽章样式映射
    function getStatusClass(status) {
      const map = {
        pending: 'status-pending',
        processing: 'status-processing',
        completed: 'status-completed',
        active: 'status-active',
        expired: 'status-expired',
        paid: 'status-paid',
        unpaid: 'status-unpaid',
        shipped: 'status-shipped'
      };
      return map[status] || 'status-pending';
    }

    // 创建语言切换器
    function createLanguageSwitcher(onChange) {
      return div(lang => {
        lang.styles({ display: 'flex', gap: '8px' });

        const languages = [
          { code: 'zh-CN', name: '中文' },
          { code: 'en', name: 'English' },
          { code: 'mn', name: 'Монгол' }
        ];

        languages.forEach(({ code, name }) => {
          lang.button(btn => {
            const isActive = getLanguage() === code;
            btn.styles({
              padding: '8px 16px',
              border: isActive ? '1px solid var(--yoya-primary)' : '1px solid var(--yoya-border)',
              borderRadius: '6px',
              background: isActive ? 'var(--yoya-primary)' : 'var(--yoya-bg)',
              color: isActive ? 'white' : 'var(--yoya-text)',
              cursor: 'pointer',
              fontSize: '14px'
            });
            btn.text(name);
            btn.onclick(() => {
              setLanguage(code);
              onChange && onChange(code);
            });
          });
        });
      });
    }

    // 创建状态徽章
    function createStatusBadge(status) {
      return div(badge => {
        badge.styles({
          display: 'inline-block',
          padding: '4px 12px',
          borderRadius: '12px',
          fontSize: '12px',
          fontWeight: '500',
          background: `var(--yoya-${status}-bg)`,
          color: `var(--yoya-${status})`
        });
        badge.text(t(`status.${status}`));
      });
    }

    // 创建可编辑字段
    function createEditableField(key, type = 'text') {
      return vField(f => {
        f.value(orderData[key]);
        f.showContent((el, val) => el.text(val));
        f.editContent((el, setValue) => {
          el.vInput(inp => {
            inp.type(type);
            inp.value(val);
            inp.onchange(e => setValue(e.target.value));
          });
        });
        f.onSave(({ value }) => {
          orderData[key] = value;
          toast.success(t('message.saveSuccess'));
        });
      });
    }

    // 创建订单信息卡片
    function createOrderCard() {
      return div(section => {
        section.styles({
          background: 'var(--yoya-card-bg)',
          borderRadius: '8px',
          padding: '20px',
          boxShadow: 'var(--yoya-shadow)',
          border: '1px solid var(--yoya-border-light)'
        });

        section.div(title => {
          title.styles({
            fontSize: '16px',
            fontWeight: '600',
            marginBottom: '16px',
            paddingBottom: '12px',
            borderBottom: '1px solid var(--yoya-border-light)'
          });
          title.text(t('order.orderInfo'));
        });

        section.vDetail(detail => {
          detail.column(2);
          detail.bordered(true);

          detail.item(t('order.orderNumber'), createEditableField('orderNumber'));
          detail.item(t('order.orderDate'), orderData.orderDate);
          detail.item(t('order.orderStatus'), createStatusBadge(orderData.orderStatus));
          detail.item(t('order.orderAmount'), `¥ ${orderData.orderAmount} ${orderData.currency}`);
          detail.item(t('order.paymentMethod'), t(`payment.${orderData.paymentMethod}`));
          detail.item(t('order.paymentStatus'), createStatusBadge(orderData.paymentStatus));
          detail.item(t('order.shippingStatus'), createStatusBadge(orderData.shippingStatus));
        });

        // 物流信息
        section.div(shipping => {
          shipping.styles({
            marginTop: '16px',
            padding: '12px',
            background: 'var(--yoya-bg-secondary)',
            borderRadius: '6px'
          });

          shipping.div(row => {
            row.styles({ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' });
            row.span(label => {
              label.styles({ color: 'var(--yoya-text-secondary)', fontSize: '13px' });
              label.text(t('order.trackingNumber'));
            });
            row.span(value => {
              value.styles({ fontWeight: '500' });
              value.text(orderData.trackingNumber);
            });
          });

          shipping.div(row => {
            row.styles({ display: 'flex', justifyContent: 'space-between' });
            row.span(label => {
              label.styles({ color: 'var(--yoya-text-secondary)', fontSize: '13px' });
              label.text(t('order.shippingAddress'));
            });
            row.span(value => {
              value.styles({ fontWeight: '500', textAlign: 'right' });
              value.text(orderData.shippingAddress);
            });
          });
        });

        // 操作按钮
        section.div(actions => {
          actions.styles({
            display: 'flex',
            gap: '12px',
            marginTop: '20px',
            paddingTop: '16px',
            borderTop: '1px solid var(--yoya-border-light)'
          });

          actions.vButton(btn => {
            btn.type('primary');
            btn.text(t('common.edit'));
          });

          actions.vButton(btn => {
            btn.type('default');
            btn.text(t('common.cancel'));
          });
        });
      });
    }

    // 创建客户信息卡片
    function createCustomerCard() {
      return div(section => {
        section.styles({
          background: 'var(--yoya-card-bg)',
          borderRadius: '8px',
          padding: '20px',
          boxShadow: 'var(--yoya-shadow)',
          border: '1px solid var(--yoya-border-light)'
        });

        section.div(title => {
          title.styles({
            fontSize: '16px',
            fontWeight: '600',
            marginBottom: '16px',
            paddingBottom: '12px',
            borderBottom: '1px solid var(--yoya-border-light)'
          });
          title.text(t('order.customerInfo'));
        });

        section.vDetail(detail => {
          detail.column(2);
          detail.bordered(true);

          detail.item(t('order.customerName'), createEditableField('customerName'));
          detail.item(t('order.customerEmail'), createEditableField('customerEmail', 'email'));
          detail.item(t('order.customerPhone'), orderData.customerPhone);
          detail.item(t('order.customerCompany'), orderData.customerCompany);

          detail.item(t('order.customerLevel'), div(l => {
            l.styles({
              display: 'inline-block',
              padding: '4px 12px',
              borderRadius: '12px',
              fontSize: '12px',
              fontWeight: '500',
              background: 'var(--yoya-primary-alpha)',
              color: 'var(--yoya-primary)'
            });
            l.text(t(`customerLevel.${orderData.customerLevel}`));
          }));
        });

        section.div(actions => {
          actions.styles({
            display: 'flex',
            gap: '12px',
            marginTop: '20px',
            paddingTop: '16px',
            borderTop: '1px solid var(--yoya-border-light)'
          });

          actions.vButton(btn => {
            btn.type('primary');
            btn.text(t('common.edit'));
          });

          actions.vButton(btn => {
            btn.type('default');
            btn.text(t('common.view'));
          });
        });
      });
    }

    // 创建合同信息卡片
    function createContractCard() {
      return div(section => {
        section.styles({
          background: 'var(--yoya-card-bg)',
          borderRadius: '8px',
          padding: '20px',
          boxShadow: 'var(--yoya-shadow)',
          border: '1px solid var(--yoya-border-light)',
          gridColumn: '1 / -1'
        });

        section.div(title => {
          title.styles({
            fontSize: '16px',
            fontWeight: '600',
            marginBottom: '16px',
            paddingBottom: '12px',
            borderBottom: '1px solid var(--yoya-border-light)'
          });
          title.text(t('order.contractInfo'));
        });

        section.vDetail(detail => {
          detail.column(3);
          detail.bordered(true);

          detail.item(t('order.contractNumber'), orderData.contractNumber);
          detail.item(t('order.contractName'), orderData.contractName);
          detail.item(t('order.contractType'), t(`contractType.${orderData.contractType}`));
          detail.item(t('order.contractAmount'), `¥ ${orderData.contractAmount}`);
          detail.item(t('order.signDate'), orderData.signDate);
          detail.item(t('order.effectiveDate'), orderData.effectiveDate);

          // 到期日期带警告
          detail.item(t('order.expiryDate'), div(exp => {
            exp.text(orderData.expiryDate);
            const days = Math.ceil((new Date(orderData.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
            if (days > 0 && days <= 30) {
              exp.span(badge => {
                badge.styles({
                  marginLeft: '8px',
                  padding: '2px 8px',
                  borderRadius: '4px',
                  fontSize: '11px',
                  background: 'var(--yoya-warning-bg)',
                  color: 'var(--yoya-warning)'
                });
                badge.text(`${t('common.warning')} - ${days}天`);
              });
            } else if (days <= 0) {
              exp.span(badge => {
                badge.styles({
                  marginLeft: '8px',
                  padding: '2px 8px',
                  borderRadius: '4px',
                  fontSize: '11px',
                  background: 'var(--yoya-error-bg)',
                  color: 'var(--yoya-error)'
                });
                badge.text(t('status.expired'));
              });
            }
          }));

          detail.item(t('order.partyA'), orderData.partyA);
          detail.item(t('order.partyB'), orderData.partyB);
          detail.item(t('order.agentName'), createEditableField('agentName'));
          detail.item(t('order.department'), orderData.department);
        });

        // 备注
        section.div(remark => {
          remark.styles({
            marginTop: '16px',
            padding: '12px',
            background: 'var(--yoya-bg-secondary)',
            borderRadius: '6px'
          });
          remark.div(label => {
            label.styles({ color: 'var(--yoya-text-secondary)', fontSize: '13px', marginBottom: '6px' });
            label.text(t('common.remark'));
          });
          remark.div(content => {
            content.styles({ color: 'var(--yoya-text)', fontSize: '14px' });
            content.text(orderData.remark || t('message.noData'));
          });
        });

        // 操作按钮
        section.div(actions => {
          actions.styles({
            display: 'flex',
            gap: '12px',
            marginTop: '20px',
            paddingTop: '16px',
            borderTop: '1px solid var(--yoya-border-light)'
          });

          actions.vButton(btn => {
            btn.type('primary');
            btn.text(t('common.edit'));
          });

          actions.vButton(btn => {
            btn.type('default');
            btn.text(t('common.download'));
          });

          actions.vButton(btn => {
            btn.type('danger');
            btn.text(t('common.delete'));
          });
        });
      });
    }

    // 渲染页面
    function renderPage() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      div(page => {
        // 页面头部
        page.div(header => {
          header.styles({
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            marginBottom: '24px',
            paddingBottom: '16px',
            borderBottom: '1px solid var(--yoya-border)'
          });

          header.div(title => {
            title.styles({ fontSize: '24px', fontWeight: '600' });
            title.text(t('order.title'));
          });

          header.child(createLanguageSwitcher(() => {
            renderPage();
            toast.info(t('message.saveSuccess'));
          }));
        });

        // 内容区域
        page.div(content => {
          content.styles({
            display: 'grid',
            gridTemplateColumns: 'repeat(2, 1fr)',
            gap: '24px'
          });

          content.child(createOrderCard());
          content.child(createCustomerCard());
          content.child(createContractCard());
        });

        page.bindTo(app);
      });
    }

    // 初始化页面
    renderPage();
  </script>
</body>
</html>
